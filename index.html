<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ㅈ@ㅎ이 발라드 취향 맞추기</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container" style="position: relative;">
    
    <div id="startScreen" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(13, 23, 61, 0.95); border-radius: 37px; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="header">
            <h1 style="font-size: 3.5rem; text-shadow: 0 0 15px #bf00ff, 0 0 30px #bf00ff; margin:0;">ㅈ@ㅎ이 발라드 취향 맞추기</h1>
            <p style="font-size: 1.5rem; color: #aaaaaa; margin-top: 20px;">
                두 곡 중 내 취향은 어떤 곡일까?<br>
                영상이 나오면 마우스를 올려 소리를 들어보세요!
            </p>
        </div>
        <button class="btn btn-1" style="margin-top: 50px; max-width: 400px; padding: 25px 40px;" onclick="startQuiz()">퀴즈 시작하기 🚀</button>
    </div>

    <div id="quizContainer">
        <div class="header">
            <h1>ㅈ@ㅎ이 발라드 취향 맞추기</h1>
            <div id="scoreDisplay" class="score-display">현재 점수: 0점</div>
        </div>
        
        <div id="quizArea">
            <div class="video-section">
                <div class="video-card">
                    <div class="player-wrapper" id="wrapper1">
                        <div id="videoPlayer1"></div>
                        <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; cursor:pointer;"></div>
                    </div>
                    <div class="song-info">
                        <p class="song-title" id="title1"></p>
                        <p class="artist-name" id="artist1"></p>
                    </div>
                </div>
                <div class="video-card">
                    <div class="player-wrapper" id="wrapper2">
                        <div id="videoPlayer2"></div>
                        <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; cursor:pointer;"></div>
                    </div>
                    <div class="song-info">
                        <p class="song-title" id="title2"></p>
                        <p class="artist-name" id="artist2"></p>
                    </div>
                </div>
            </div>
            
            <div class="button-section">
                <button class="btn btn-1" onclick="submitAnswer(0)">왼쪽 곡 선택</button>
                <button class="btn btn-2" onclick="submitAnswer(1)">오른쪽 곡 선택</button>
            </div>
        </div>
        
        <div id="message"></div>
        
        <button id="resetBtn" class="btn btn-1" style="display: none; margin: 30px auto 0; max-width: 300px;" onclick="resetQuiz()">다시 풀기 🔄</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
