<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const quizList = [
        {
            correctIndex: 0,
            videoIds: ["0kQzjDaDxZM&t", "kO8fAn_A0p8"],
            startTime: 60,
            titles: ["한 페이지가 될 수 있게", "예뻤어"],
            artists: ["DAY6", "DAY6"]
        },
        {
            // 두 번째 문제 예시 (여기에 원하는 곡을 더 추가하세요!)
            correctIndex: 1,
            videoIds: ["I3U0QAXeOW4", "_78CYlWmigI"], 
            startTime: 45,
            titles: ["예뻤어 (교차편집)", "한 페이지가 될 수 있게 (교차편집)"],
            artists: ["DAY6", "DAY6"]
        }
    ];

    let currentQuizIndex = 0;
    let score = 0;
    let players = [];
    let isWaitingNext = false;

    function onYouTubeIframeAPIReady() {
        const currentQuiz = quizList[currentQuizIndex];
        
        players[0] = new YT.Player('player1', {
            videoId: currentQuiz.videoIds[0],
            playerVars: { 
                'start': currentQuiz.startTime, 
                'autoplay': 1, 
                'mute': 1, // 자동 재생을 위해 음소거 필수
                'origin': window.location.protocol + '//' + window.location.host
            }
        });
        
        players[1] = new YT.Player('player2', {
            videoId: currentQuiz.videoIds[1],
            playerVars: { 
                'start': currentQuiz.startTime, 
                'autoplay': 1, 
                'mute': 1,
                'origin': window.location.protocol + '//' + window.location.host
            }
        });

        updateQuizInfo();
    }

    function updateQuizInfo() {
        const currentQuiz = quizList[currentQuizIndex];
        document.getElementById('title1').innerText = currentQuiz.titles[0];
        document.getElementById('artist1').innerText = currentQuiz.artists[0];
        document.getElementById('title2').innerText = currentQuiz.titles[1];
        document.getElementById('artist2').innerText = currentQuiz.artists[1];
        document.getElementById('message').innerText = "";
        isWaitingNext = false;
    }

    function checkAnswer(choice) {
        if (isWaitingNext) return;
        isWaitingNext = true; // 중복 클릭 방지

        const msg = document.getElementById('message');
        const currentQuiz = quizList[currentQuizIndex];

        if (choice === currentQuiz.correctIndex) {
            score++;
            document.getElementById('scoreDisplay').innerText = `현재 점수: ${score}점`;
            msg.style.color = "#2ecc71";
            msg.innerText = "🎉 정답! 1점 획득! 다음 문제로 넘어갑니다.";
        } else {
            msg.style.color = "#e74c3c";
            msg.innerText = "땡! 틀렸습니다 ㅠㅠ 다음 문제로 넘어갑니다.";
        }

        // 2초 뒤에 다음 곡으로 넘어가기
        setTimeout(() => {
            currentQuizIndex++;
            if (currentQuizIndex < quizList.length) {
                const nextQuiz = quizList[currentQuizIndex];
                
                // 🛠️ 오류 해결된 부분: 로드 방식을 더 직관적인 파라미터 전달 방식으로 변경
                players[0].loadVideoById(nextQuiz.videoIds[0], nextQuiz.startTime);
                players[1].loadVideoById(nextQuiz.videoIds[1], nextQuiz.startTime);
                
                updateQuizInfo();
            } else {
                // 준비된 퀴즈가 끝나면 화면 숨기고 최종 점수 표시
                document.getElementById('quizArea').style.display = 'none';
                msg.style.color = "#ff007f";
                msg.innerText = `퀴즈 끝! 최종 점수는 ${score}점 입니다!`;
            }
        }, 2000);
    }
</script>
