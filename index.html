<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ㅈ@ㅎ이 발라드 취향 맞추기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ㅈ@ㅎ이 발라드 취향 맞추기</h1>
        <div class="score-board" id="scoreDisplay">현재 점수: 0점</div>
    </div>
    
    <div id="quizContainer">
        <div class="quiz-section">
            <div class="video-card">
                <div class="iframe-container">
                    <iframe id="videoPlayer1" allow="autoplay"></iframe>
                </div>
                <div class="song-info">
                    <p class="song-title" id="title1"></p>
                    <p class="artist-name" id="artist1"></p>
                </div>
            </div>
            
            <div class="video-card">
                <div class="iframe-container">
                    <iframe id="videoPlayer2" allow="autoplay"></iframe>
                </div>
                <div class="song-info">
                    <p class="song-title" id="title2"></p>
                    <p class="artist-name" id="artist2"></p>
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="answer-btn btn-left" onclick="submitAnswer(0)">왼쪽 곡 선택</button>
            <button class="answer-btn btn-right" onclick="submitAnswer(1)">오른쪽 곡 선택</button>
        </div>
    </div>

    <div id="feedback"></div>
</div>

<script src="script.js"></script>
</body>
</html>
